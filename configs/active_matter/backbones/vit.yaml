# ViT backbone preset (V-JEPA small).
model:
  backbone: "vit"
  encoder_size: "small"
  encoder:
    img_size: 256
    patch_size: 16
    num_frames: 16
    tubelet_size: 2
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    uniform_power: false
  predictor:
    predictor_embed_dim: 384
    depth: 6
    num_heads: 6
    mlp_ratio: 4.0
