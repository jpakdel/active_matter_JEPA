# D-JEPA default config for active_matter.
#
# This file holds non-axis defaults: data, optim, log. The other axes — model
# (backbone), train (target type), and loss (regularizer) — come from preset
# files in their own directories. See src/config_loader.py for the merge order.
#
# Run via:
#   python scripts/train.py --routing exp_a --backbone vit --target ema --loss sigreg
#   python scripts/eval.py  --run-dir runs/<run_id>

# --- identification -----------------------------------------------------------
# `experiment` and `run_name` are filled in by the routing override.
seed: 0

# --- data ---------------------------------------------------------------------
data:
  # Relative to REFACTORED_CODEBASE/ (the cwd of scripts/train.py and
  # scripts/eval.py). The actual data lives one directory up in the parent
  # repo. If you move this folder elsewhere, update this path.
  data_dir: "../data/active_matter"
  num_frames: 16
  stride: null            # null = stride == num_frames (non-overlapping windows)
  noise_std: 0.0
  # context_channels / target_channels filled in by the routing override.

# --- model --------------------------------------------------------------------
# Filled in by --backbone preset (configs/active_matter/backbones/*.yaml).

# --- train --------------------------------------------------------------------
# Filled in by --target preset (configs/active_matter/targets/*.yaml).
# Defaults if no preset is selected:
train:
  target_type: "shared_stopgrad"
  ema_decay: 0.996

# --- loss ---------------------------------------------------------------------
# Filled in by --loss preset (configs/active_matter/losses/*.yaml).

# --- optim --------------------------------------------------------------------
optim:
  batch_size: 2             # per-device; ~2.3 GB peak on RTX 4070 SUPER at size=small
  num_workers: 4
  num_epochs: 30
  lr: 3.0e-4
  start_lr: 1.0e-6
  final_lr: 1.0e-6
  warmup_epochs: 2
  weight_decay: 0.05
  final_weight_decay: 0.4
  wd_exclude_bias_and_norm: true
  grad_clip: 1.0
  use_amp: true
  compile: false

# --- logging / checkpointing --------------------------------------------------
log:
  out_dir: "runs"
  log_every_steps: 10
  val_every_epochs: 1
  save_every_steps: 500
  keep_last_n_ckpts: 3
