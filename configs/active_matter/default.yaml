# D-JEPA default config for active_matter.
#
# This file holds every knob the training and eval pipelines understand,
# at sane default values. It is layered with one of the routing files
# ({baseline, exp_a, exp_b}.yaml) and one of the regularizer presets in
# presets/ — see src/config_loader.py for the merge logic.
#
# Run via:
#   python scripts/train.py --routing exp_a --reg vicreg
#   python scripts/eval.py  --run-dir runs/<run_id>

# --- identification -----------------------------------------------------------
# `experiment` and `run_name` are filled in by the routing override.
seed: 0

# --- data ---------------------------------------------------------------------
data:
  data_dir: "data/active_matter"
  num_frames: 16
  stride: null            # null = stride == num_frames (non-overlapping windows)
  noise_std: 0.0
  # context_channels / target_channels filled in by the routing override.

# --- model --------------------------------------------------------------------
model:
  encoder_size: "small"     # tiny | small | base | large
  encoder:
    img_size: 256
    patch_size: 16
    num_frames: 16
    tubelet_size: 2
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    uniform_power: false
  predictor:
    predictor_embed_dim: 384
    depth: 6
    num_heads: 6
    mlp_ratio: 4.0

# --- loss ---------------------------------------------------------------------
# Defaults to SIGReg at λ=0.1; presets/ overlays this block to switch
# regularizer family or sweep a specific knob.
loss:
  reg_type: "sigreg"
  lambda_sigreg: 0.1
  sigreg_num_slices: null   # null -> defaults to encoder embed_dim
  sigreg_t_max: 3.0
  sigreg_n_points: 17
  # VICReg defaults (only consulted when reg_type=="vicreg"):
  vicreg_var_weight: 25.0
  vicreg_cov_weight: 1.0
  vicreg_gamma: 1.0
  vicreg_eps: 1.0e-4

# --- optim --------------------------------------------------------------------
optim:
  batch_size: 2             # per-device; ~2.3 GB peak on RTX 4070 SUPER at size=small
  num_workers: 4
  num_epochs: 30
  lr: 3.0e-4
  start_lr: 1.0e-6
  final_lr: 1.0e-6
  warmup_epochs: 2
  weight_decay: 0.05
  final_weight_decay: 0.4
  wd_exclude_bias_and_norm: true
  grad_clip: 1.0
  use_amp: true
  compile: false

# --- logging / checkpointing --------------------------------------------------
log:
  out_dir: "runs"
  log_every_steps: 10
  val_every_epochs: 1
  save_every_steps: 500
  keep_last_n_ckpts: 3
